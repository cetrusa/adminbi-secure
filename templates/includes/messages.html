{% if messages %}
<div class="messages-container mb-3">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show d-flex align-items-center"
        role="alert">
        {% if 'success' in message.tags %}
        <i class="fas fa-check-circle me-2"></i>
        {% elif 'error' in message.tags or 'danger' in message.tags %}
        <i class="fas fa-exclamation-circle me-2"></i>
        {% elif 'warning' in message.tags %}
        <i class="fas fa-exclamation-triangle me-2"></i>
        {% else %}
        <i class="fas fa-info-circle me-2"></i>
        {% endif %}
        <span>{{ message }}</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
    {% endfor %}
</div>
<script>
    // Auto-dismiss después de 8 segundos
    document.addEventListener('DOMContentLoaded', function () {
        setTimeout(function () {
            document.querySelectorAll('.messages-container .alert').forEach(function (alert) {
                var bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
                if (bsAlert) bsAlert.close();
            });
        }, 8000);
    });
</script>
{% endif %}
