<!-- Select2 CSS (Bootstrap 5 theme) -->
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />

<!-- Selector de bases de datos -->
<div class="database-selector-wrapper">
    <div class="d-flex align-items-center gap-2">
        <i class="fas fa-building text-primary"></i>
        <label class="selector-label fw-semibold mb-0 d-none d-sm-inline">Empresa:</label>
        <form class="flex-grow-1" style="max-width: 350px;" action="{% url form_url %}" method="post"
            id="FormSelectorBase">
            {% csrf_token %}
            <select class="form-select form-select-sm" id="database_select" name="database_select">
                <option disabled selected>Seleccione una empresa</option>
            </select>
        </form>
    </div>
</div>
<!-- JavaScript del selector de bases de datos -->
<script>
    (function initDatabaseSelector() {
        // Carga dinámica de Select2 (requiere jQuery previo)
        function loadSelect2(callback) {
            var s1 = document.createElement('script');
            s1.src = 'https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js';
            s1.onload = function () {
                var s2 = document.createElement('script');
                s2.src = 'https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/i18n/es.js';
                s2.onload = callback;
                document.head.appendChild(s2);
            };
            document.head.appendChild(s1);
        }

        function init() {
            loadSelect2(function () {
                // Prioridad: sessionStorage > sesion del servidor (fallback)
                var database = window.sessionStorage.getItem("database_name") || '{{ database_name|default:"" }}';
                var $databaseSelect = $('#database_select');

                $.get('{% url "users_app:database_list" %}', function (data) {
                    // Remover el option placeholder disabled
                    $databaseSelect.empty();
                    $databaseSelect.append('<option value="">Seleccione una empresa</option>');

                    $.each(data.databases_list, function (index, db) {
                        $databaseSelect.append('<option value="' + db.database_name + '">' + db.database_nmEmpresa + '</option>');
                    });

                    if (database) {
                        $databaseSelect.val(database);
                        // Sincronizar sessionStorage con el valor del servidor si estaba vacio
                        window.sessionStorage.setItem("database_name", database);
                    }

                    // Inicializar Select2 con búsqueda progresiva
                    $databaseSelect.select2({
                        theme: 'bootstrap-5',
                        placeholder: 'Buscar empresa...',
                        allowClear: false,
                        language: 'es',
                        width: '100%'
                    });
                });

                $databaseSelect.on('change', function () {
                    var selectedValue = $(this).val();
                    if (selectedValue) {
                        window.sessionStorage.setItem("database_name", selectedValue);
                        updateDatabaseName(selectedValue, true);
                    }
                });
            });
        }

        function updateDatabaseName(newDatabase, shouldReload) {
            console.log("Updating database name:", newDatabase);
            var csrfToken = document.getElementsByName("csrfmiddlewaretoken")[0].value;
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "{% url form_url %}", true);
            xhr.setRequestHeader("X-CSRFToken", csrfToken);
            xhr.setRequestHeader("X-Requested-With", "XMLHttpRequest");
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
            xhr.onreadystatechange = function () {
                if (this.readyState === XMLHttpRequest.DONE) {
                    if (this.status === 200) {
                        console.log("Database name updated successfully:", newDatabase);
                        database = newDatabase;
                        if (shouldReload) {
                            window.location.reload();
                        }
                    } else {
                        console.log("Error al actualizar:", this.status, this.responseText);
                    }
                }
            };
            xhr.send("database_select=" + encodeURIComponent(newDatabase));
        }

        // Esperar a que jQuery esté disponible (se carga al final del body)
        function waitForJQuery() {
            if (typeof window.$ !== "undefined" && typeof window.$.fn !== "undefined") {
                init();
            } else {
                setTimeout(waitForJQuery, 50);
            }
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", waitForJQuery);
        } else {
            waitForJQuery();
        }
    })();
</script>
