{% load static %}
<!-- Barra lateral estilo GXON -->
<div class="h-100 d-flex flex-column rounded-3" style="min-height: calc(100vh - 80px);">
  <div class="d-flex flex-column align-items-center align-items-sm-start px-2 pt-2 text-white flex-grow-1">

    <!-- User Profile Minimal -->
    <div class="d-flex align-items-center mb-4 mt-3 px-3 w-100">
      <div class="symbol symbol-40px me-3">
        <img src="{% static 'images/user-profile.png' %}" alt="profile" class="rounded-circle" width="45" height="45">
      </div>
      <div class="d-none d-sm-flex flex-column">
        <span class="fw-bold fs-6 text-white">{{ user.username }}</span>
        <span class="text-muted fs-7 small">{{ user.get_full_name|default:"Usuario" }}</span>
      </div>
    </div>

    <h6 class="text-uppercase text-muted fw-bold fs-7 px-3 mb-2 w-100 d-none d-sm-block" style="letter-spacing: 1px;">
      Inteligencia BI</h6>

    <!-- Enlaces de Navegación -->
    <ul class="nav nav-pills flex-column w-100 mb-auto">
      {% if perms.permisos.informe_bi %}
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'reporte_bi_publico' %}active{% endif %}"
          href="{% url 'bi_app:reporte_bi_publico' %}">
          <i class="fas fa-chart-line"></i> <span class="ms-2 d-none d-sm-inline">Dashboard BI</span>
        </a>
      </li>
      {% endif %}

      {% if perms.permisos.informe_bi_embed %}
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'reporte_embed' %}active{% endif %}"
          href="{% url 'bi_app:reporte_embed' %}">
          <i class="fas fa-chart-pie"></i> <span class="ms-2 d-none d-sm-inline">BI Embed</span>
        </a>
      </li>
      {% endif %}
    </ul>
  </div>
</div>
