{% extends "base.html" %}

{% block title %}Editar Usuario{% endblock title %}

{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0">Editar Usuario</h3>
    <div>
      <a class="btn btn-sm btn-outline-warning me-1" href="{% url 'users_app:set-password' object.pk %}">
        <i class="fas fa-key me-1"></i>Cambiar contraseña
      </a>
      <a class="btn btn-sm btn-outline-secondary" href="{% url 'users_app:user-list' %}">Volver</a>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
      </form>
    </div>
  </div>
</div>
{% endblock content %}
