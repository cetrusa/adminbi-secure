{% extends 'base.html' %}
{% load static %}
{% block title %}
Contraseña restablecida
{% endblock title %}

{% block content %}
<div class="auth-page-wrapper">
    <div class="auth-graphic-side">
        <img src="{% static 'images/imagen-login.png' %}" class="img-fluid"
            style="max-width: 85%; height: auto; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);"
            alt="Ilustración DataZenith">
    </div>

    <div class="auth-card-side">
        <div class="auth-card">
            <div class="auth-header">
                <img src="{% static 'images/Logo-DataZenith.png' %}" class="auth-logo"
                    style="height: 48px; object-fit: contain; margin-bottom: 2rem;" alt="DataZenith Logo">
                <h3 class="auth-title">Contraseña restablecida</h3>
                <p class="auth-subtitle">Tu contraseña ha sido cambiada con éxito. Ya puedes iniciar sesión con tu nueva contraseña.</p>
            </div>

            <div class="text-center mb-3">
                <i class="fas fa-check-circle" style="font-size: 3rem; color: #28a745; opacity: 0.8;"></i>
            </div>

            <a href="{% url 'users_app:user-login' %}" class="btn btn-primary auth-btn">Iniciar sesión</a>
        </div>
    </div>
</div>
{% endblock content %}
